$kind: http-request
url: http://localhost:8080/actuator/loggers
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
      pm.response.to.have.status(200); });

      pm.test('Response contains loggers object', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('loggers');
          pm.expect(Object.keys(json.loggers).length).to.be.above(0);
      });
    language: text/javascript
order: 5000
