$kind: http-request
name: GET /users - within limit
url: http://localhost:8080/users
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200 or 429', function () {
          pm.expect([200, 429]).to.include(pm.response.code);
      });
      if (pm.response.code === 429) {
          pm.test('Rate limit response has status 429', function () {
              pm.expect(pm.response.json().status).to.eql(429);
          });
      }
    language: text/javascript
order: 1000
