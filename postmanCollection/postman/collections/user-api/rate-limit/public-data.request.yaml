$kind: http-request
url: http://localhost:8080/api/example/public-data
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200 or 429', function () {
          pm.expect([200, 429]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
          pm.test('Response has message field', function () {
              pm.expect(pm.response.json()).to.have.property('message');
          });
      }
      if (pm.response.code === 429) {
          pm.test('Rate limit response has status 429', function () {
              pm.expect(pm.response.json().status).to.eql(429);
          });
      }
    language: text/javascript
order: 2000
