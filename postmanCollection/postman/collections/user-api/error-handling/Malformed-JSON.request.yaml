$kind: http-request
url: http://localhost:8080/users
method: POST
body:
  type: json
  content: "{ bad json }"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Malformed JSON returns 400', function () {
      pm.response.to.have.status(400); });

      pm.test('Error message mentions malformed JSON', function () {
          const json = pm.response.json();
          pm.expect(json.message).to.include('Malformed');
      });
    language: text/javascript
order: 4000
