$kind: http-request
url: http://localhost:8080/users/{{userId}}
method: POST
body:
  type: json
  content: ""
scripts:
  - type: beforeRequest
    code: pm.variables.set('userId', '1');
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Wrong method returns 405', function () {
      pm.response.to.have.status(405); });

      pm.test('Error message mentions method not allowed', function () {
          const json = pm.response.json();
          pm.expect(json.error).to.include('Method Not Allowed');
      });
    language: text/javascript
order: 3000
