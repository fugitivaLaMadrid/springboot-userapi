$kind: http-request
url: http://localhost:8080/actuator/metrics/http.server.requests
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
      pm.response.to.have.status(200); });

      pm.test('Metric has required fields', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('name', 'http.server.requests');
          pm.expect(json.measurements).to.be.an('array').that.is.not.empty;
      });
    language: text/javascript
order: 4000
