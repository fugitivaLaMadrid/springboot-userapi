$kind: http-request
url: http://localhost:8080/users/abc
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test('Wrong type in path returns 400', function () {
      pm.response.to.have.status(400); });

      pm.test('Error message mentions invalid value', function () {
          const json = pm.response.json();
          pm.expect(json.message).to.include('abc');
      });
    language: text/javascript
order: 1000
