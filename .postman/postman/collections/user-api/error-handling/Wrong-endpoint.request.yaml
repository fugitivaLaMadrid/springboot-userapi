$kind: http-request
url: http://localhost:8080/wrongpath
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test('Wrong endpoint returns 404', function () {
      pm.response.to.have.status(404); });

      pm.test('Error response has status field', function () {
          const json = pm.response.json();
          pm.expect(json.status).to.eql(404);
      });
    language: text/javascript
order: 2000
