$kind: http-request
name: DeleteUserById
url: http://localhost:8080/users/{{deleteUserId}}
method: DELETE
scripts:
  - type: beforeRequest
    code: |-
      pm.sendRequest({
          url: 'http://localhost:8080/users',
          method: 'POST',
          header: {
              'Content-Type': 'application/json',
              'Authorization': 'Basic ' + btoa('admin:admin123')
          },
          body: {
              mode: 'raw',
              raw: JSON.stringify({
                  username: 'username_test_' + Date.now(),
                  email: 'user_email_test' + Date.now() + '@gmail.com'
              })
          }
      }, function (err, res) {
          if (err) { throw new Error('Failed to create user: ' + err.message); }
          pm.expect(res.code).to.be.oneOf([200, 201]);
          const json = res.json();
          pm.variables.set('deleteUserId', json.id);
      });
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status code is 204 No Content', function () {
      pm.response.to.have.status(204); });

      pm.test('Response time is under 2000ms', function () {
      pm.expect(pm.response.responseTime).to.be.below(2000); });
    language: text/javascript
order: 6000
