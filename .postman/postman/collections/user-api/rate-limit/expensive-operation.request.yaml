$kind: http-request
url: http://localhost:8080/api/example/expensive-operation
method: POST
body:
  type: json
  content: "{\r

    \  \"operation\": \"data_processing\",\r

    \  \"input\": \"sample_data\",\r

    \  \"parameters\": {\r

    \    \"timeout\": 30,\r

    \    \"retry_count\": 3\r

    \  }\r

    }"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200 or 429', function () {
          pm.expect([200, 429]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
          pm.test('Response has message and processed fields', function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property('message');
              pm.expect(json).to.have.property('processed');
          });
      }
      if (pm.response.code === 429) {
          pm.test('Rate limit response has status 429', function () {
              pm.expect(pm.response.json().status).to.eql(429);
          });
      }
    language: text/javascript
order: 6000
